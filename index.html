<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>TV Tubo Antiga</title>
<style>
body {
  margin: 0;
  background: #0c0c0c;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.tv {
  width: 740px;
  height: 520px;
  background: linear-gradient(#4a4a4a, #2a2a2a, #1f1f1f);
  border-radius: 45px 45px 60px 60px;
  padding: 35px 40px 70px 40px;
  box-shadow: 
    0 0 100px rgba(0,0,0,0.95),
    inset 0 0 60px #111,
    0 40px 80px rgba(0,0,0,0.8);
  position: relative;
  border: 18px solid #1a1a1a;
}

/* Bezel superior com botão da TV antiga */
.tv::before {
  content: "";
  position: absolute;
  top: -22px;
  left: 50%;
  transform: translateX(-50%);
  width: 140px;
  height: 18px;
  background: #222;
  border-radius: 12px;
  box-shadow: 0 6px 12px rgba(0,0,0,0.7);
}

.screen {
  width: 100%;
  height: 100%;
  background: #000;
  border-radius: 6px;
  overflow: hidden;
  position: relative;
  box-shadow: 
    inset 0 0 80px #000,
    inset 0 0 40px rgba(0,0,0,0.9);
  animation: subtle-flicker 0.15s infinite alternate, light-shake 0.8s infinite;
}

/* Scanlines realistas de TV tubo */
.screen::before {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 3px,
    rgba(255,255,255,0.07) 3px,
    rgba(255,255,255,0.07) 6px
  );
  pointer-events: none;
  z-index: 2;
  mix-blend-mode: overlay;
  animation: static 0.25s steps(3) infinite;
}

/* Reflexo de vidro curvo + vinheta */
.screen::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 40%, transparent 55%, rgba(0,0,0,0.75) 100%);
  z-index: 3;
  pointer-events: none;
  border-radius: 6px;
}

@keyframes subtle-flicker {
  0% { opacity: 0.97; }
  100% { opacity: 1; }
}

@keyframes light-shake {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  25% { transform: translate(1px, -1px) rotate(-0.3deg); }
  50% { transform: translate(-1px, 1px) rotate(0.4deg); }
  75% { transform: translate(1px, 1px) rotate(-0.2deg); }
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
  filter: contrast(1.1) brightness(0.95);
  pointer-events: none;
}

#finalText {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #ddd;
  font-size: 54px;
  font-family: 'Courier New', monospace;
  font-weight: bold;
  text-shadow: 
    0 0 15px #999,
    0 0 30px #555,
    3px 3px 0 #222,
    -3px -3px 0 #222;
  display: none;
  z-index: 10;
  letter-spacing: 8px;
  text-transform: uppercase;
  animation: text-glitch 0.2s infinite;
  pointer-events: none;
}

.glitch {
  position: relative;
}

.glitch::before,
.glitch::after {
  content: attr(data-text);
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  opacity: 0.85;
}

.glitch::before {
  color: #aaa;
  animation: glitch1 0.25s infinite linear alternate-reverse;
  clip-path: polygon(0 0, 100% 0, 100% 40%, 0 40%);
}

.glitch::after {
  color: #ccc;
  animation: glitch2 0.3s infinite linear alternate-reverse;
  clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
}

@keyframes glitch1 {
  0% { transform: translate(-2px, -2px); }
  100% { transform: translate(3px, 2px); }
}

@keyframes glitch2 {
  0% { transform: translate(2px, 3px); }
  100% { transform: translate(-3px, -2px); }
}

@keyframes text-glitch {
  0%, 100% { transform: translate(-50%, -50%); }
  50% { transform: translate(-50%, -51%); }
}
</style>
</head>
<body>

<div class="tv">
  <div class="screen" id="screen">
    <iframe id="yt" 
      src="https://www.youtube.com/embed/xwpowWDr7UY?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&playsinline=1" 
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
      allowfullscreen>
    </iframe>
    
    <div id="finalText" class="glitch" data-text="S.O.S ERROR 404">
      S.O.S ERROR 404
    </div>
  </div>
</div>

<script>
const finalText = document.getElementById("finalText");
const screen = document.getElementById("screen");

setTimeout(() => {
  finalText.style.display = "block";
  
  // Tremor leve só no texto
  setInterval(() => {
    const rx = (Math.random() * 8 - 4);
    const ry = (Math.random() * 8 - 4);
    finalText.style.transform = `translate(calc(-50% + ${rx}px), calc(-50% + ${ry}px))`;
  }, 120);

}, 56000); // 56 segundos
</script>
</body>
</html>
