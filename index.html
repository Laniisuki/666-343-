<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>666-343</title>
<style>
body {
  margin: 0;
  background: radial-gradient(circle at center, #2a0000, #0a0a0a);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.tv {
  width: 720px;
  height: 480px;
  background: linear-gradient(#3a3a3a, #1f1f1f);
  border-radius: 35px;
  padding: 25px 30px 45px;
  box-shadow: 
    inset 0 0 40px #000,
    0 0 90px rgba(80, 0, 0, 0.9),
    0 40px 70px rgba(120, 0, 0, 0.7);
  position: relative;
  border: 14px solid #0f0f0f;
}

.tv::before {
  content: "";
  position: absolute;
  top: -18px;
  left: 50%;
  transform: translateX(-50%);
  width: 130px;
  height: 14px;
  background: #1a1a1a;
  border-radius: 10px;
}

.screen {
  width: 100%;
  height: 100%;
  background: #000;
  border-radius: 8px;
  overflow: hidden;
  position: relative;
  box-shadow: inset 0 0 70px #000;
  animation: heavy-flicker 0.07s infinite alternate, shake-intense 0.35s infinite;
}

.screen::before {
  content: "";
  position: absolute;
  inset: 0;
  background: 
    repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 2px,
      rgba(255, 30, 30, 0.09) 2px,
      rgba(255, 30, 30, 0.09) 4px
    );
  background-size: 100% 4px;
  pointer-events: none;
  z-index: 2;
  animation: static-noise 0.2s steps(4) infinite;
  mix-blend-mode: screen;
}

.screen::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    transparent 38%,
    rgba(255, 255, 255, 0.3) 40%,
    transparent 42%
  );
  animation: vhs-tracking 1.4s linear infinite;
  opacity: 0.65;
  z-index: 3;
  pointer-events: none;
}

@keyframes static-noise {
  0% { opacity: 0.45; }
  50% { opacity: 0.75; }
  100% { opacity: 0.5; }
}

@keyframes vhs-tracking {
  0% { transform: translateY(-120%); }
  100% { transform: translateY(450%); }
}

@keyframes heavy-flicker {
  0% { opacity: 0.94; }
  100% { opacity: 1; }
}

@keyframes shake-intense {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  15% { transform: translate(-4px, 3px) rotate(-1deg); }
  30% { transform: translate(5px, -4px) rotate(1.2deg); }
  45% { transform: translate(-6px, 2px) rotate(-0.8deg); }
  60% { transform: translate(4px, -3px) rotate(0.9deg); }
  75% { transform: translate(-3px, 4px) rotate(-1.1deg); }
  90% { transform: translate(5px, -2px) rotate(0.6deg); }
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
  filter: contrast(1.2) saturate(1.4) brightness(0.95);
  pointer-events: none;
}

#finalText {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #c80000;
  font-size: 62px;
  font-family: 'Courier New', monospace;
  font-weight: 900;
  text-shadow: 
    0 0 20px #ff0000,
    0 0 40px #8b0000,
    6px 6px 0 #330000,
    -6px -6px 0 #330000;
  display: none;
  z-index: 10;
  letter-spacing: 6px;
  animation: final-red-glitch 0.12s infinite;
  pointer-events: none;
  text-transform: uppercase;
}

.glitch {
  position: relative;
}

.glitch::before,
.glitch::after {
  content: attr(data-text);
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
}

.glitch::before {
  color: #ff2222;
  animation: glitch-top 0.18s infinite linear alternate-reverse;
  clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
  text-shadow: 0 0 15px #ff0000;
}

.glitch::after {
  color: #aa0000;
  animation: glitch-bottom 0.22s infinite linear alternate-reverse;
  clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
  text-shadow: 0 0 15px #ff0000;
}

@keyframes glitch-top {
  0% { transform: translate(-4px, -3px); }
  25% { transform: translate(5px, 4px); }
  50% { transform: translate(-6px, -2px); }
  75% { transform: translate(3px, 5px); }
}

@keyframes glitch-bottom {
  0% { transform: translate(4px, 3px); }
  25% { transform: translate(-5px, -4px); }
  50% { transform: translate(6px, 2px); }
  75% { transform: translate(-3px, -5px); }
}

@keyframes final-red-glitch {
  0%, 100% { transform: translate(-50%, -50%) skew(0deg); }
  50% { transform: translate(-50%, -53%) skew(7deg); }
}
</style>
</head>
<body>

<div class="tv">
  <div class="screen" id="screen">
    <iframe id="yt" 
      src="https://www.youtube.com/embed/xwpowWDr7UY?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&playsinline=1" 
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
      allowfullscreen>
    </iframe>
    
    <div id="finalText" class="glitch" data-text="S.O.S ERROR 404">
      S.O.S ERROR 404
    </div>
  </div>
</div>

<script>
const finalText = document.getElementById("finalText");
const screen = document.getElementById("screen");

setTimeout(() => {
  finalText.style.display = "block";
  
  setInterval(() => {
    const rx = (Math.random() * 16 - 8);
    const ry = (Math.random() * 16 - 8);
    finalText.style.transform = `translate(calc(-50% + ${rx}px), calc(-50% + ${ry}px))`;
  }, 75);

  screen.style.animation = "heavy-flicker 0.05s infinite alternate, shake-intense 0.22s infinite";
}, 56000); // 56 segundos
</script>
</body>
</html>
