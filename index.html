<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>666o</title>
<style>
body {
  margin: 0;
  background: #000000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.tv {
  width: 740px;
  height: 520px;
  background: #1c1c1c;
  border-radius: 45px 45px 65px 65px;
  padding: 35px 40px 75px 40px;
  box-shadow: 
    0 0 120px rgba(0,0,0,0.98),
    inset 0 0 80px #0a0a0a;
  position: relative;
  border: 22px solid #111111;
}

.tv::before {
  content: "";
  position: absolute;
  top: -25px;
  left: 50%;
  transform: translateX(-50%);
  width: 150px;
  height: 20px;
  background: #151515;
  border-radius: 15px;
}

.screen {
  width: 100%;
  height: 100%;
  background: #000000;
  border-radius: 4px;
  overflow: hidden;
  position: relative;
  box-shadow: inset 0 0 90px #000000;
  animation: old-crt-flicker 0.12s infinite alternate;
}

/* Scanlines grossas de TV antiga */
.screen::before {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 4px,
    rgba(255,255,255,0.09) 4px,
    rgba(255,255,255,0.09) 8px
  );
  pointer-events: none;
  z-index: 2;
  mix-blend-mode: overlay;
}

/* Ruído estático (snow) forte + falha */
.screen::after {
  content: "";
  position: absolute;
  inset: 0;
  background: 
    radial-gradient(circle at 50% 40%, transparent 50%, rgba(0,0,0,0.85) 100%),
    linear-gradient(transparent 40%, rgba(255,255,255,0.15) 42%, transparent 44%);
  z-index: 3;
  pointer-events: none;
  animation: static-failure 0.25s steps(6) infinite, vhs-lines 1.8s linear infinite;
  opacity: 0.75;
}

@keyframes old-crt-flicker {
  0% { opacity: 0.94; }
  100% { opacity: 1; }
}

@keyframes static-failure {
  0%   { opacity: 0.6; filter: contrast(1.05); }
  50%  { opacity: 0.85; filter: contrast(0.95); }
  100% { opacity: 0.65; filter: contrast(1.1); }
}

@keyframes vhs-lines {
  0%   { transform: translateY(-150%); }
  100% { transform: translateY(500%); }
}

#player {
  width: 100%;
  height: 100%;
  filter: brightness(0.92) contrast(1.08);
}

#finalText {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #bbbbbb;
  font-size: 52px;
  font-family: 'Courier New', monospace;
  font-weight: bold;
  text-shadow: 
    0 0 12px #666666,
    0 0 25px #444444,
    4px 4px 0 #111111,
    -4px -4px 0 #111111;
  display: none;
  z-index: 10;
  letter-spacing: 6px;
  text-transform: uppercase;
  animation: subtle-text-glitch 0.3s infinite;
  pointer-events: none;
}

.glitch {
  position: relative;
}

.glitch::before,
.glitch::after {
  content: attr(data-text);
  position: absolute;
  left: 0; top: 0;
  width: 100%; height: 100%;
  opacity: 0.8;
}

.glitch::before {
  color: #999999;
  animation: glitch1 0.35s infinite linear alternate-reverse;
  clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
}

.glitch::after {
  color: #aaaaaa;
  animation: glitch2 0.4s infinite linear alternate-reverse;
  clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
}

@keyframes glitch1 { 0% { transform: translate(-2px, -1px); } 100% { transform: translate(2px, 1px); } }
@keyframes glitch2 { 0% { transform: translate(2px, 1px); } 100% { transform: translate(-2px, -1px); } }
@keyframes subtle-text-glitch { 0%, 100% { transform: translate(-50%, -50%); } 50% { transform: translate(-50%, -51.5%); } }
</style>
</head>
<body>

<div class="tv">
  <div class="screen">
    <div id="player"></div>
    <div id="finalText" class="glitch" data-text="S.O.S ERROR 404">S.O.S ERROR 404</div>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
let player;

function onYouTubeIframeAPIReady() {
  player = new YT.Player('player', {
    videoId: 'xwpowWDr7UY',
    playerVars: {
      autoplay: 1,
      mute: 1,
      controls: 0,
      modestbranding: 1,
      rel: 0,
      playsinline: 1,
      loop: 0
    },
    events: {
      'onReady': (e) => {
        e.target.mute();
        e.target.playVideo();
      }
    }
  });
}

const finalText = document.getElementById("finalText");

setTimeout(() => {
  if (player && typeof player.pauseVideo === 'function') {
    player.pauseVideo();
  }
  finalText.style.display = "block";
  
  // Glitch leve só no texto
  setInterval(() => {
    const rx = (Math.random() * 6 - 3);
    const ry = (Math.random() * 6 - 3);
    finalText.style.transform = `translate(calc(-50% + ${rx}px), calc(-50% + ${ry}px))`;
  }, 160);
}, 56000);
</script>
</body>
</html>
