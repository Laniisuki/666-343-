<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>S.O.S</title>

<style>
body {
  margin: 0;
  background: #0a0a0a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.tv {
  width: 700px;
  height: 450px;
  background: #2b2b2b;
  border-radius: 25px;
  padding: 20px;
  box-shadow: inset 0 0 30px #000, 0 0 60px rgba(0,0,0,0.8);
  position: relative;
}

.screen {
  width: 100%;
  height: 100%;
  background: black;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: contrast(1.2) brightness(0.9) saturate(1.2);
}

/* scanlines */
.screen::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.06) 0px,
    rgba(255,255,255,0.06) 2px,
    transparent 2px,
    transparent 4px
  );
  pointer-events: none;
}

/* brilho da tela */
.screen::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, transparent 60%, rgba(0,0,0,0.6));
  pointer-events: none;
}

/* texto final glitch */
#finalText {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #00ff9c;
  font-size: 50px;
  font-family: monospace;
  display: none;
  text-shadow: 0 0 10px #00ff9c;
}

.glitch::before,
.glitch::after {
  content: attr(data-text);
  position: absolute;
  left: 0;
  width: 100%;
}

.glitch::before {
  top: -2px;
  color: red;
}

.glitch::after {
  top: 2px;
  color: blue;
}

/* leve tremida */
@keyframes shake {
  0% { transform: translate(0,0); }
  25% { transform: translate(1px,-1px); }
  50% { transform: translate(-1px,1px); }
  75% { transform: translate(1px,1px); }
  100% { transform: translate(0,0); }
}

.screen {
  animation: shake 0.15s infinite;
}

</style>
</head>

<body>

<div class="tv">
  <div class="screen">
    <video id="video" src="Java-runtime-gamma 2026.03.31 - 14.00.48.02.mp4"></video>
    <div id="finalText" class="glitch" data-text="S.O.S ERROR 404">S.O.S ERROR 404</div>
  </div>
</div>

<script>
const video = document.getElementById("video");
const finalText = document.getElementById("finalText");

// autoplay
video.play();

// NÃO repetir
video.loop = false;

// quando terminar
video.addEventListener("ended", () => {
  finalText.style.display = "block";

  // efeito glitch leve no final
  setInterval(() => {
    finalText.style.transform = `translate(${Math.random()*10-5}px, ${Math.random()*10-5}px)`;
  }, 100);
});
</script>

</body>
</html>
